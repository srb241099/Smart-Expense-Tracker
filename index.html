<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Flow</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">
<style>
* { box-sizing:border-box; }
body { margin:0; font-family:Arial; background:#121212; color:#fff; }

#splash {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:#121212;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  z-index:9999;
}
#splash h1 { color:#00aaff; margin-bottom:10px; }
#splash p { color:#888; }
.dots { display:flex; gap:6px; margin-top:12px; }
.dots span {
  width:6px; height:6px;
  background:#ff8800; border-radius:50%;
  animation:blink 1.4s infinite;
}
.dots span:nth-child(2){ animation-delay:0.2s; }
.dots span:nth-child(3){ animation-delay:0.4s; }
@keyframes blink {
  0%,80%,100%{ opacity:0.3; transform:scale(1); }
  40%{ opacity:1; transform:scale(1.3); }
}

header {
  padding:15px; background:#1e1e1e;
  text-align:center; border-bottom:1px solid #333;
  position:relative;
}
header h1 { margin:0; color:#00aaff; font-size:20px; }
header p { margin:2px 0 0; font-size:12px; color:#888; }

.dl-btn {
  position:absolute; right:12px; top:50%;
  transform:translateY(-50%);
  background:#1e1e1e; border:1px solid #333;
  border-radius:8px; color:#fff;
  width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:18px;
}

.tabs {
  display:flex; background:#1e1e1e;
  border-bottom:1px solid #333;
}
.tab {
  flex:1; padding:12px;
  text-align:center; cursor:pointer;
  font-size:14px; color:#888;
  border-bottom:2px solid transparent;
}
.tab.active { color:#00aaff; border-bottom:2px solid #00aaff; }

.section { display:none; }
.section.active { display:block; }

.totals { display:flex; gap:8px; padding:10px; }
.box { flex:1; background:#222; padding:10px; border-radius:10px; text-align:center; }
.box h3 { margin:5px 0; color:#00aaff; }

.input { padding:12px; }
label { font-size:12px; color:#888; display:block; margin-top:5px; }

input, select {
  width:100%; padding:12px; margin:6px 0;
  background:#222; border:1px solid #333;
  color:#fff; -webkit-text-fill-color:#fff;
  border-radius:8px; font-size:16px;
  height:48px; box-sizing:border-box;
}
input[type="date"] { -webkit-appearance:none; appearance:none; }
input[type="date"]::before { content:attr(data-placeholder); color:#888; pointer-events:none; }
input[type="date"]:focus::before,
input[type="date"]:valid::before { display:none; }
input[type="date"]::-webkit-datetime-edit { -webkit-text-fill-color:#fff; }
input[type="date"]::-webkit-datetime-edit-text { -webkit-text-fill-color:#888; }
input[type="date"]::-webkit-calendar-picker-indicator {
  filter:invert(1); opacity:1; width:20px; height:20px;
}

.row { display:flex; gap:8px; }
.col { flex:1; }
#amt, #ccamt { text-align:center; }

button {
  width:100%; padding:12px;
  background:#ff8800; border:none;
  border-radius:8px; color:#fff;
  font-weight:bold; margin-top:8px; font-size:16px;
}

.list { height:48vh; overflow:auto; padding:10px; }

.date-group { background:#1e1e1e; margin-bottom:10px; border-radius:10px; }
.date-head {
  padding:10.5px; display:flex;
  justify-content:space-between; cursor:pointer;
}
.entries { display:none; }
.entry {
  padding:10px; border-top:1px solid #333;
  display:flex; justify-content:space-between; align-items:center;
}
.left { max-width:70%; }
.amount { background:#2a2a2a; padding:6px 10px; border-radius:8px; }
.tag {
  display:inline-block; padding:2px 6px;
  border-radius:6px; font-size:11px; margin-top:4px;
}
.cash { background:#444; }
.upi { background:#0066ff; }
.cc-tag { background:#aa00ff; }
.ccupi { background:#ff5500; }

.footer { text-align:center; font-size:11px; color:#777; padding:10px; }
</style>
</head>
<body>

<div id="splash">
  <h1>💰 Expense Flow 💰</h1>
  <p>By Saurabh Rai</p>
  <p>Loading your data...</p>
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<header>
  <h1>Expense Flow</h1>
  <p>Smart Expense Tracker</p>
  <div class="dl-btn" onclick="exportCSV()">⬇</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('spent')">Spent</div>
  <div class="tab" onclick="switchTab('cc')">Credit Card</div>
</div>

<!-- SPENT -->
<div class="section active" id="sec-spent">
  <div class="totals">
    <div class="box"><div>Today</div><h3 id="today">₹0</h3></div>
    <div class="box"><div>Monthly</div><h3 id="month">₹0</h3></div>
  </div>
  <div class="input">
    <div class="row">
      <div class="col">
        <label>Select Date</label>
        <input type="date" id="date" data-placeholder="Select Date" required>
      </div>
      <div class="col">
        <label>Amount</label>
        <input type="number" id="amt" placeholder="Enter Amount">
      </div>
    </div>
    <label>Remark</label>
    <input type="text" id="remark" placeholder="Remark">
    <label>Payment Mode</label>
    <select id="mode">
      <option>Cash</option>
      <option>UPI</option>
    </select>
    <button onclick="addSpent()">Add Expense</button>
  </div>
  <div class="list" id="list-spent"></div>
</div>

<!-- CREDIT CARD -->
<div class="section" id="sec-cc">
  <div class="totals">
    <div class="box"><div>Today</div><h3 id="cc-today">₹0</h3></div>
    <div class="box"><div>Monthly</div><h3 id="cc-month">₹0</h3></div>
  </div>
  <div class="input">
    <div class="row">
      <div class="col">
        <label>Select Date</label>
        <input type="date" id="ccdate" data-placeholder="Select Date" required>
      </div>
      <div class="col">
        <label>Amount</label>
        <input type="number" id="ccamt" placeholder="Enter Amount">
      </div>
    </div>
    <label>Remark</label>
    <input type="text" id="ccremark" placeholder="Remark">
    <label>Card Type</label>
    <select id="cctype">
      <option>Credit Card</option>
      <option>Credit Card UPI</option>
    </select>
    <button onclick="addCC()">Add CC Expense</button>
  </div>
  <div class="list" id="list-cc"></div>
</div>

<div class="footer">By Saurabh Rai</div>

<script>
let spentData = {};
let ccData = {};
let activeTab = 'spent';

function migrateOldData() {
  let old = JSON.parse(localStorage.getItem('exp')) || {};
  let hasNew = localStorage.getItem('exp-spent') || localStorage.getItem('exp-cc');
  if(Object.keys(old).length > 0 && !hasNew) {
    Object.keys(old).forEach(date => {
      old[date].forEach(entry => {
        if(entry.mode === 'Credit Card' || entry.mode === 'Credit Card UPI') {
          if(!ccData[date]) ccData[date] = [];
          ccData[date].push(entry);
        } else {
          if(!spentData[date]) spentData[date] = [];
          spentData[date].push(entry);
        }
      });
    });
    save();
  }
}

function save() {
  localStorage.setItem('exp-spent', JSON.stringify(spentData));
  localStorage.setItem('exp-cc', JSON.stringify(ccData));
}

function load() {
  spentData = JSON.parse(localStorage.getItem('exp-spent')) || {};
  ccData = JSON.parse(localStorage.getItem('exp-cc')) || {};
}

function fmt(n) { return n.toFixed(2); }

function formatDate(d) {
  return String(d.getDate()).padStart(2,'0') + '-' +
         String(d.getMonth()+1).padStart(2,'0') + '-' +
         d.getFullYear();
}

function convertInputDate(val) {
  if(!val) return formatDate(new Date());
  let [y,m,d] = val.split('-');
  return `${d}-${m}-${y}`;
}

function todayStr() { return formatDate(new Date()); }

function currentMonthStr() {
  let now = new Date();
  return String(now.getMonth()+1).padStart(2,'0') + '-' + now.getFullYear();
}

function isCurrentMonth(dateStr) {
  let [d,m,y] = dateStr.split('-');
  return `${m}-${y}` === currentMonthStr();
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='spent') || (i===1 && tab==='cc'));
  });
  document.getElementById('sec-spent').classList.toggle('active', tab==='spent');
  document.getElementById('sec-cc').classList.toggle('active', tab==='cc');
}

function exportCSV() {
  let data = activeTab === 'spent' ? spentData : ccData;
  let rows = ['Date,Amount,Remark,Payment Mode'];
  let dates = Object.keys(data).sort((a,b) => {
    let [da,ma,ya] = a.split('-');
    let [db,mb,yb] = b.split('-');
    return new Date(ya,ma-1,da) - new Date(yb,mb-1,db);
  });
  dates.forEach(date => {
    data[date].forEach(entry => {
      let remark = (entry.remark || '').replace(/,/g,' ');
      rows.push(`${date},${entry.amt},${remark},${entry.mode}`);
    });
  });
  let blob = new Blob([rows.join('\n')], { type:'text/csv' });
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url;
  a.download = `expense-flow-${activeTab}-${formatDate(new Date())}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function addSpent() {
  let a = document.getElementById('amt').value;
  if(!a) return;
  let d = convertInputDate(document.getElementById('date').value);
  if(!spentData[d]) spentData[d] = [];
  spentData[d].push({
    amt: +a,
    remark: document.getElementById('remark').value,
    mode: document.getElementById('mode').value
  });
  save();
  document.getElementById('amt').value = '';
  document.getElementById('remark').value = '';
  document.getElementById('date').value = '';
  renderSpent();
}

function addCC() {
  let a = document.getElementById('ccamt').value;
  if(!a) return;
  let d = convertInputDate(document.getElementById('ccdate').value);
  if(!ccData[d]) ccData[d] = [];
  ccData[d].push({
    amt: +a,
    remark: document.getElementById('ccremark').value,
    mode: document.getElementById('cctype').value
  });
  save();
  document.getElementById('ccamt').value = '';
  document.getElementById('ccremark').value = '';
  document.getElementById('ccdate').value = '';
  renderCC();
}

function renderList(data, listId, color) {
  let list = document.getElementById(listId);
  list.innerHTML = '';
  let dates = Object.keys(data).sort((a,b) => {
    let [da,ma,ya] = a.split('-');
    let [db,mb,yb] = b.split('-');
    return new Date(yb,mb-1,db) - new Date(ya,ma-1,da);
  });
  dates.forEach((d,i) => {
    let wrap = document.createElement('div');
    wrap.className = 'date-group';
    let head = document.createElement('div');
    head.className = 'date-head';
    let total = data[d].reduce((s,e) => s+e.amt, 0);
    head.innerHTML = `${d} <span style="color:${color}">₹${fmt(total)}</span>`;
    let entries = document.createElement('div');
    entries.className = 'entries';
    if(i===0) entries.style.display = 'block';
    head.onclick = () => {
      entries.style.display = entries.style.display==='block' ? 'none' : 'block';
    };
    [...data[d]].reverse().forEach(e => {
      let div = document.createElement('div');
      div.className = 'entry';
      let tagClass = e.mode==='Cash' ? 'cash' : e.mode==='UPI' ? 'upi' : e.mode==='Credit Card' ? 'cc-tag' : 'ccupi';
      div.innerHTML = `
        <div class="left">
          <div>${e.remark || 'No remark'}</div>
          <div class="tag ${tagClass}">${e.mode}</div>
        </div>
        <div class="amount" style="color:${color}">₹${fmt(e.amt)}</div>
      `;
      entries.appendChild(div);
    });
    wrap.appendChild(head);
    wrap.appendChild(entries);
    list.appendChild(wrap);
  });
}

function renderSpent() {
  renderList(spentData, 'list-spent', '#ffaa33');
  let monthTotal = 0, todayTotal = 0;
  Object.keys(spentData).forEach(d => {
    let total = spentData[d].reduce((s,e) => s+e.amt, 0);
    if(isCurrentMonth(d)) monthTotal += total;
    if(d === todayStr()) todayTotal = total;
  });
  document.getElementById('month').innerText = '₹' + fmt(monthTotal);
  document.getElementById('today').innerText = '₹' + fmt(todayTotal);
}

function renderCC() {
  renderList(ccData, 'list-cc', '#cc66ff');
  let monthTotal = 0, todayTotal = 0;
  Object.keys(ccData).forEach(d => {
    let total = ccData[d].reduce((s,e) => s+e.amt, 0);
    if(isCurrentMonth(d)) monthTotal += total;
    if(d === todayStr()) todayTotal = total;
  });
  document.getElementById('cc-month').innerText = '₹' + fmt(monthTotal);
  document.getElementById('cc-today').innerText = '₹' + fmt(todayTotal);
}

load();
migrateOldData();
renderSpent();
renderCC();

window.onload = () => {
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
  }, 1200);
};

if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
